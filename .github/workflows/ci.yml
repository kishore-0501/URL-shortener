name: Full CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Backend install
      - name: Install backend dependencies
        run: npm install

      # Frontend build
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
  sonar-scan:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=kishore-0501-URL-shortener
            -Dsonar.organization=kishore-0501
            -Dsonar.sources=.

  docker-build-push:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Backend image
      - name: Build backend image
        run: |
          docker build -t kishore0501/url-backend:latest .

      - name: Push backend image
        run: |
          docker push kishore0501/url-backend:latest

      # Frontend image
      - name: Build frontend image
        run: |
          docker build -t kishore0501/url-frontend:latest ./frontend

      - name: Push frontend image
        run: |
          docker push kishore0501/url-frontend:latest

  deploy-to-eks:
    needs: docker-build-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name url-shortener-cluster

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/
          kubectl apply -f k8s/frontend/

          kubectl rollout restart deployment backend
          kubectl rollout restart deployment frontend